<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Self-Calibrating Conformal badge</title>
  <desc id="desc">A circular badge with a central prediction curve, upper and lower interval bounds, and a shaded prediction interval band.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7eb"/>
      <stop offset="100%" stop-color="#e5f4ee"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c98b48" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#177d70" stop-opacity="0.32"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#244149" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="240" fill="none"/>
  <circle cx="512" cy="512" r="404" fill="url(#bg)" filter="url(#shadow)"/>
  <circle cx="512" cy="512" r="404" fill="none" stroke="#ffffff" stroke-opacity="0.9" stroke-width="10"/>
  <circle cx="512" cy="512" r="392" fill="none" stroke="#17323b" stroke-opacity="0.08" stroke-width="2"/>

  <path d="M292 654 C360 612, 426 566, 512 520 C596 474, 676 436, 740 384" fill="none" stroke="#17323b" stroke-opacity="0.12" stroke-width="16" stroke-linecap="round"/>
  <path d="M296 584 C360 556, 430 518, 510 468 C590 420, 666 384, 736 326 L736 430 C666 482, 592 518, 512 566 C432 612, 362 648, 296 684 Z" fill="url(#band)"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M286 692 L286 336" stroke="#17323b" stroke-opacity="0.22" stroke-width="10"/>
    <path d="M286 692 L760 692" stroke="#17323b" stroke-opacity="0.22" stroke-width="10"/>
    <path d="M320 664 C382 632, 442 596, 506 548 C568 500, 646 458, 728 392" stroke="#c98b48" stroke-width="18"/>
    <path d="M320 610 C380 578, 442 544, 506 504 C570 464, 644 430, 728 366" stroke="#177d70" stroke-width="22"/>
    <path d="M320 554 C382 524, 442 492, 506 450 C568 410, 646 376, 728 334" stroke="#c98b48" stroke-width="18"/>
    <path d="M324 610 C380 578, 442 544, 506 504 C570 464, 644 430, 728 366" stroke="#ffffff" stroke-opacity="0.42" stroke-width="8"/>
    <path d="M612 454 L612 584" stroke="#17323b" stroke-opacity="0.18" stroke-width="8"/>
    <path d="M588 458 L636 458" stroke="#17323b" stroke-opacity="0.18" stroke-width="8"/>
    <path d="M588 580 L636 580" stroke="#17323b" stroke-opacity="0.18" stroke-width="8"/>
  </g>

  <g fill="#17323b" fill-opacity="0.7" font-family="Space Grotesk, Avenir Next, sans-serif" font-size="40" font-weight="700" letter-spacing="4">
    <text x="512" y="820" text-anchor="middle">SELF-CALIBRATING</text>
    <text x="512" y="868" text-anchor="middle">CONFORMAL</text>
  </g>
</svg>
