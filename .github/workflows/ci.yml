name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest

  notebooks:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and notebook dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Execute notebook guides
        run: |
          jupyter nbconvert --to notebook --execute quickstart_regression.ipynb --output /tmp/quickstart_regression.ipynb
          jupyter nbconvert --to notebook --execute quickstart_quantile_cp.ipynb --output /tmp/quickstart_quantile_cp.ipynb
          jupyter nbconvert --to notebook --execute advanced_customization.ipynb --output /tmp/advanced_customization.ipynb

  build:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,docs]"
      - name: Build package and docs
        run: |
          python -m build
          mkdocs build
